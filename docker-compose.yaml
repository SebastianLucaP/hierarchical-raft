services:

  leaf-a-1:
    build: .
    environment:
      - NODE_NAME=leaf-a-1
      - NODE_TYPE=leaf
      - PEERS=leaf-a-2,leaf-a-3
      - UPSTREAM_URLS=http://regional-1:9000,http://regional-2:9000,http://regional-3:9000
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data

  leaf-a-2:
    build: .
    environment:
      - NODE_NAME=leaf-a-2
      - NODE_TYPE=leaf
      - PEERS=leaf-a-1,leaf-a-3
      - UPSTREAM_URLS=http://regional-1:9000,http://regional-2:9000,http://regional-3:9000
    ports:
      - "8082:8080"
    volumes:
      - ./data:/app/data

  leaf-a-3:
    build: .
    environment:
      - NODE_NAME=leaf-a-3
      - NODE_TYPE=leaf
      - PEERS=leaf-a-1,leaf-a-2
      - UPSTREAM_URLS=http://regional-1:9000,http://regional-2:9000,http://regional-3:9000
    ports:
      - "8083:8080"
    volumes:
      - ./data:/app/data

  leaf-b-1:
    build: .
    environment:
      - NODE_NAME=leaf-b-1
      - NODE_TYPE=leaf
      - PEERS=leaf-b-2,leaf-b-3
      - UPSTREAM_URLS=http://regional-1:9000,http://regional-2:9000,http://regional-3:9000
    ports:
      - "8091:8080"
    volumes:
      - ./data:/app/data

  leaf-b-2:
